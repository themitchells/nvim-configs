# Verible Linter Configuration
# Syntax:
#   +rule-name              Enable rule with defaults
#   +rule-name=param:value  Enable and configure rule
#   -rule-name              Disable rule
#
# Documentation: https://chipsalliance.github.io/verible/verilog_lint.html
# List all rules: verible-verilog-lint --help_rules

# ============================================================================
# ACTIVE RULES (Currently Enforced)
# ============================================================================

# Line length limit
+line-length=length:250

# Disable specific rules
-generate-label-prefix
-packed-dimensions-range-ordering
-module-parameter

# ============================================================================
# NAMING CONVENTIONS (Commented - uncomment to enable)
# ============================================================================

# Module and file naming
# -module-filename                    # Don't enforce module name = filename

# Parameter naming style
# -parameter-name-style               # Allow any parameter naming (UPPER/lower/Mixed)
# +parameter-name-style=style:ALL_CAPS  # Require UPPER_CASE parameters

# Port naming style
# -port-name-style                    # Allow any port naming
# +port-name-style=style:lower_snake_case  # Require lowercase with underscores

# Signal naming
# -signal-name-style                  # Allow any signal naming
# -underscore-leading-trailing        # Allow leading/trailing underscores

# ============================================================================
# FORMATTING & STYLE (Commented - uncomment to enable)
# ============================================================================

# Always block requirements
# -always-comb-blocking               # Allow blocking assigns in always_comb
# -always-ff-non-blocking            # Allow non-blocking in always_ff (not recommended)

# Parameter declarations
# -explicit-parameter-storage-type    # Don't require 'parameter logic' (allow 'parameter')

# Indentation and spacing
# +indent-width=width:4               # Enforce 4-space indentation
# -proper-parameter-declaration       # Don't enforce parameter declaration style

# ============================================================================
# SYSTEMVERILOG FEATURES (Commented - uncomment to enable)
# ============================================================================

# Interface naming
# -interface-name-style               # Allow any interface naming
# +interface-name-style=suffix:_if    # Require _if suffix on interfaces

# Constraint naming
# -constraint-name-style              # Allow any constraint naming

# Typedef naming
# -typedef-structs-unions             # Don't require typedef for structs/unions
# -typedef-enums                      # Don't require typedef for enums

# ============================================================================
# CODE ORGANIZATION (Commented - uncomment to enable)
# ============================================================================

# File organization
# -one-module-per-file                # Allow multiple modules per file
# -module-begin-block                 # Don't require begin after module declaration

# Port declarations
# -port-declarations                  # Don't enforce specific port declaration format

# ============================================================================
# COMMON RULES TO CONSIDER DISABLING
# ============================================================================

# These often produce false positives or don't match common coding styles:
# -explicit-begin                     # Don't require begin/end for single statements
# -generate-label                     # Don't require labels on generate blocks
# -no-tabs                           # Allow tabs (if your team uses them)
# -forbidden-macro                    # Allow certain macros
# -unpacked-dimensions-range-ordering # Don't enforce [0:N] vs [N:0] ordering

# ============================================================================
# TEAM-SPECIFIC RULES
# ============================================================================

# Add your team's specific rule configurations here
# Examples:
# -legacy-generate-region             # Allow old-style generate syntax
# -void-cast                         # Don't require void casting of function returns
